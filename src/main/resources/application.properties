spring.application.name=YumDrop
server.port=8084

# MySQL datasource
spring.datasource.url=jdbc:mysql://localhost:3306/yumdrop?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#JWT
jwt.secret=super-secret-key-change-this-32-bytes-min
jwt.expiry=3600000


